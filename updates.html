<h1>Updates</h1>
<div id="posts"></div>

<script>
fetch('posts.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('posts');
    data.reverse().forEach(post => {
      const el = document.createElement('div');
      el.innerHTML = `<h2>${post.title}</h2><p>${post.description}</p>`;
      container.appendChild(el);
    });
  });
</script>
